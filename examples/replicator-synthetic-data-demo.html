<!DOCTYPE html>
<!--
  omni.replicator.core → utsushimi synthetic-data demo.

  Standalone HTML, zero build step. Domain-randomizes a small scene (scatter +
  color) over N frames via the bit-reproducible utsushimi sampler, ray-traces
  each frame with kami-rt, and draws the REAL projected 2D bounding boxes over
  it — the annotated training data Replicator would emit, plus the COCO JSON.

  Mirrors the canonical TypeScript sources at:
    20-actors/etzhayyim-sdk/src/nv-compat/utsushimi/*.ts
    20-actors/etzhayyim-sdk/src/nv-compat/omni-replicator-core.ts

  Clean-room: Replicator / Omniverse are trademarks of NVIDIA Corporation;
  names used here are API-compat identifiers only (Google v. Oracle, 2021). No
  Replicator source or binaries are used.

  ADR-2605261800 §D1/D6/D10.4 — R1.3 omni-replicator-core surface.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Replicator → utsushimi synthetic data (nv-compat R1.3)</title>
  <style>
    html,body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
    h1{margin:0;font-size:17px;color:#7ee787;}
    .ctl{display:flex;gap:10px;align-items:center;font-size:13px;}
    button{background:#238636;color:#fff;border:0;border-radius:6px;padding:6px 14px;cursor:pointer;}
    canvas{border:1px solid #21262d;border-radius:6px;background:#0d1117;image-rendering:pixelated;width:320px;height:320px;}
    .stats{font-size:12px;font-family:ui-monospace,monospace;color:#8b949e;}
    pre{max-width:560px;max-height:160px;overflow:auto;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px;font-size:10px;color:#8b949e;}
  </style>
</head>
<body>
  <h1>omni.replicator.core → utsushimi synthetic data</h1>
  <div class="ctl">
    <label>seed <input id="seed" type="number" value="42" style="width:64px;background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:4px;"></label>
    <button id="go">Generate</button>
    <span class="stats">frame <span id="f">0</span>/<span id="n">0</span> · boxes <span id="b">0</span></span>
  </div>
  <canvas id="cv" width="256" height="256"></canvas>
  <pre id="coco">COCO annotations.json appears here.</pre>

<script type="module">
// ── utsushimi sampler (BigInt LCG, mirror of sampler.ts) ───────────────────
const MASK=(1n<<64n)-1n,MUL=6364136223846793005n,INC=1442695040888963407n;
class Sampler{constructor(seed=0){this.s=(BigInt(seed)*MUL+INC)&MASK;}u01(){this.s=(this.s*MUL+INC)&MASK;return Number((this.s>>33n)&0x7fffffffn)/2147483648;}uni(a,b){return a+(b-a)*this.u01();}}

// ── kami-rt (compact ray tracer for RGB) ───────────────────────────────────
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],norm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1;return[a[0]/l,a[1]/l,a[2]/l];};
function cubeTris(c,h){const v=[[c[0]-h,c[1]-h,c[2]-h],[c[0]+h,c[1]-h,c[2]-h],[c[0]+h,c[1]+h,c[2]-h],[c[0]-h,c[1]+h,c[2]-h],[c[0]-h,c[1]-h,c[2]+h],[c[0]+h,c[1]-h,c[2]+h],[c[0]+h,c[1]+h,c[2]+h],[c[0]-h,c[1]+h,c[2]+h]];const q=(a,b,cc,d)=>[[v[a],v[b],v[cc]],[v[a],v[cc],v[d]]];return[...q(0,1,2,3),...q(5,4,7,6),...q(4,0,3,7),...q(1,5,6,2),...q(4,5,1,0),...q(3,2,6,7)];}
function lookAt(eye,t,up,vfov,asp){const th=vfov*Math.PI/180,h=Math.tan(th/2),vh=2*h,vw=asp*vh;const w=norm(sub(eye,t)),u=norm(cross(up,w)),v=cross(w,u);const ho=[u[0]*vw,u[1]*vw,u[2]*vw],ve=[v[0]*vh,v[1]*vh,v[2]*vh];return{origin:eye,lowerLeft:[eye[0]-ho[0]/2-ve[0]/2-w[0],eye[1]-ho[1]/2-ve[1]/2-w[1],eye[2]-ho[2]/2-ve[2]/2-w[2]],horizontal:ho,vertical:ve};}
function hitTri(ro,rd,v0,v1,v2){const e1=sub(v1,v0),e2=sub(v2,v0),p=cross(rd,e2),det=dot(e1,p);if(det>-1e-7&&det<1e-7)return -1;const inv=1/det,t=sub(ro,v0),u=dot(t,p)*inv;if(u<0||u>1)return -1;const q=cross(t,e1),vv=dot(rd,q)*inv;if(vv<0||u+vv>1)return -1;const tt=dot(e2,q)*inv;return tt>1e-4?tt:-1;}
function render(tris,cols,cam,W,H){const fb=new Uint8ClampedArray(W*H*4);const L=norm([-.4,-1,-.3]);for(let py=0;py<H;py++)for(let px=0;px<W;px++){const s=(px+0.5)/W,tp=(py+0.5)/H;const dir=norm([cam.lowerLeft[0]+s*cam.horizontal[0]+tp*cam.vertical[0]-cam.origin[0],cam.lowerLeft[1]+s*cam.horizontal[1]+tp*cam.vertical[1]-cam.origin[1],cam.lowerLeft[2]+s*cam.horizontal[2]+tp*cam.vertical[2]-cam.origin[2]]);
  let bT=1e30,hi=-1;for(let i=0;i<tris.length;i++){const t=hitTri(cam.origin,dir,tris[i][0],tris[i][1],tris[i][2]);if(t>0&&t<bT){bT=t;hi=i;}}
  const o=((H-1-py)*W+px)*4;if(hi>=0){let nm=norm(cross(sub(tris[hi][1],tris[hi][0]),sub(tris[hi][2],tris[hi][0])));if(dot(nm,dir)>0)nm=[-nm[0],-nm[1],-nm[2]];const lit=0.25+0.75*Math.max(0,dot(nm,[-L[0],-L[1],-L[2]]));const c=cols[hi];fb[o]=c[0]*lit*255;fb[o+1]=c[1]*lit*255;fb[o+2]=c[2]*lit*255;fb[o+3]=255;}else{fb[o]=13;fb[o+1]=17;fb[o+2]=23;fb[o+3]=255;}}return fb;}

// ── projection (mirror of render-bridge.ts) ────────────────────────────────
function projCam(eye,t,up,vfov,asp){const w=norm(sub(eye,t)),u=norm(cross(up,w)),v=cross(w,u);return{eye,w,u,v,tan:Math.tan(vfov*Math.PI/180/2),asp};}
function project(c,p,W,H){const d=sub(p,c.eye),depth=-dot(d,c.w);if(depth<=1e-4)return null;const cx=dot(d,c.u),cy=dot(d,c.v);return[((cx/depth/(c.tan*c.asp))*0.5+0.5)*W,(1-((cy/depth/c.tan)*0.5+0.5))*H];}
function projAabb(c,mn,mx,W,H){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9,any=false;for(let i=0;i<8;i++){const pr=project(c,[i&1?mx[0]:mn[0],i&2?mx[1]:mn[1],i&4?mx[2]:mn[2]],W,H);if(!pr)continue;any=true;x0=Math.min(x0,pr[0]);y0=Math.min(y0,pr[1]);x1=Math.max(x1,pr[0]);y1=Math.max(y1,pr[1]);}if(!any)return null;x0=Math.max(0,Math.min(W,x0));y0=Math.max(0,Math.min(H,y0));x1=Math.max(0,Math.min(W,x1));y1=Math.max(0,Math.min(H,y1));return x1<=x0||y1<=y0?null:[x0,y0,x1-x0,y1-y0];}

const PALETTE=[[0.85,0.3,0.3],[0.3,0.55,0.9],[0.4,0.8,0.4],[0.9,0.75,0.3]];
const W=256,H=256,N=12;
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");

function generate(){
  const seed=+document.getElementById("seed").value;const samp=new Sampler(seed);
  document.getElementById("n").textContent=N;
  const coco={info:{description:"utsushimi COCO",version:"1.0",year:2026},images:[],annotations:[],categories:[{id:0,name:"box",supercategory:"object"}]};
  let annId=0,frame=0;
  function step(){
    if(frame>=N){document.getElementById("coco").textContent=JSON.stringify(coco,null,1).slice(0,2000);return;}
    // scatter 3 cubes on the ground plane
    const cubes=[];for(let k=0;k<3;k++)cubes.push([samp.uni(-1.6,1.6),0,samp.uni(-1.6,1.6)]);
    const eye=[0,3.2,5.5],target=[0,0,0],up=[0,1,0],vfov=50;
    const cam=lookAt(eye,target,up,vfov,W/H),pc=projCam(eye,target,up,vfov,W/H);
    const tris=[],cols=[];cubes.forEach((c,i)=>{const ct=cubeTris(c,0.5);ct.forEach(t=>{tris.push(t);cols.push(PALETTE[i%PALETTE.length]);});});
    const fb=render(tris,cols,cam,W,H);
    const img=new ImageData(fb,W,H);ctx.putImageData(img,0,0);
    // boxes
    coco.images.push({id:frame,file_name:`rgb_${String(frame).padStart(4,"0")}.png`,width:W,height:H});
    ctx.lineWidth=1.5;ctx.strokeStyle="#7ee787";ctx.font="10px ui-monospace";ctx.fillStyle="#7ee787";let nb=0;
    cubes.forEach(c=>{const bb=projAabb(pc,[c[0]-0.5,c[1]-0.5,c[2]-0.5],[c[0]+0.5,c[1]+0.5,c[2]+0.5],W,H);if(!bb)return;nb++;ctx.strokeRect(bb[0],bb[1],bb[2],bb[3]);ctx.fillText("box",bb[0]+2,bb[1]+10);coco.annotations.push({id:annId++,image_id:frame,category_id:0,bbox:bb.map(v=>+v.toFixed(1)),area:+(bb[2]*bb[3]).toFixed(1),iscrowd:0});});
    document.getElementById("f").textContent=frame+1;document.getElementById("b").textContent=nb;
    frame++;setTimeout(step,300);
  }
  step();
}
document.getElementById("go").addEventListener("click",generate);
generate();
</script>
</body>
</html>
