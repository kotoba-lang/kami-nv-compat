<!DOCTYPE html>
<!--
  omni.client (Nucleus) → Omniverse Cloud render demo.

  Standalone HTML, zero build step. Stores a USDA scene in a content-addressed
  Nucleus store (with version history + checkpoints), then submits a turntable
  render job to the Murakumo render farm and plays back the rendered frames.

  Mirrors the canonical TypeScript sources at:
    20-actors/etzhayyim-sdk/src/nv-compat/kotoba-datomic-nucleus/*.ts
    20-actors/etzhayyim-sdk/src/nv-compat/murakumo-render/*.ts
    20-actors/etzhayyim-sdk/src/nv-compat/{omni-nucleus,omni-cloud}.ts

  Clean-room: Omniverse / Nucleus are trademarks of NVIDIA Corporation; names
  used here are API-compat identifiers only (Google v. Oracle, 2021). No
  Omniverse source/binaries. Renders on the Murakumo fleet only (ADR-2605215000),
  never a commercial cloud.

  ADR-2605261800 §D1/D6/D10.4 — R1.7 + R1.9 surfaces.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nucleus → Cloud render (nv-compat R1.7+R1.9)</title>
  <style>
    html,body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
    h1{margin:0;font-size:17px;color:#7ee787;}
    .row{display:flex;gap:18px;align-items:flex-start;}
    canvas{border:1px solid #21262d;border-radius:6px;background:#0d1117;image-rendering:pixelated;width:200px;height:200px;}
    pre{font-size:11px;color:#8b949e;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px;width:360px;min-height:200px;}
    .ctl{display:flex;gap:8px;align-items:center;font-size:13px;}
    button{background:#238636;color:#fff;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;}
  </style>
</head>
<body>
  <h1>omni.client Nucleus → Omniverse Cloud render</h1>
  <div class="ctl">
    <button id="write">write + checkpoint USDA</button>
    <button id="render">submit turntable render</button>
    <span style="font-size:12px;color:#8b949e;">frame <span id="f">0</span>/<span id="n">0</span></span>
  </div>
  <div class="row">
    <canvas id="cv" width="120" height="120"></canvas>
    <pre id="log">nucleus log…</pre>
  </div>

<script type="module">
// ── content addressing (FNV-1a fallback — demo only; SDK uses sha-256) ─────
function cid(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);}return "cid:"+(h>>>0).toString(16).padStart(8,"0");}
class NucleusStore{constructor(){this.e=new Map();this.subs=new Map();}
  write(p,c,msg){let en=this.e.get(p);const created=!en;if(!en){en={v:[]};this.e.set(p,en);}const head=en.v[en.v.length-1];const id=cid(c);if(head&&head.cid===id&&msg===undefined)return head;const v={cid:id,content:c,index:en.v.length,message:msg};en.v.push(v);this.notify(p,created?"created":"modified",id);return v;}
  read(p){const en=this.e.get(p);return en&&en.v.length?en.v[en.v.length-1].content:null;}
  history(p){return[...(this.e.get(p)?.v||[])];}
  subscribe(k,cb){let s=this.subs.get(k);if(!s){s=new Set();this.subs.set(k,s);}s.add(cb);return()=>s.delete(cb);}
  notify(p,kind,id){for(const[k,s]of this.subs)if(k===p||(k.endsWith("/")&&p.startsWith(k)))for(const cb of s)cb({path:p,kind,cid:id});}}

// ── kami-rt ray tracer ─────────────────────────────────────────────────────
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],norm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1;return[a[0]/l,a[1]/l,a[2]/l];};
function lookAt(eye,t,up,vf,asp){const th=vf*Math.PI/180,h=Math.tan(th/2),vh=2*h,vw=asp*vh,w=norm(sub(eye,t)),u=norm(cross(up,w)),v=cross(w,u),ho=[u[0]*vw,u[1]*vw,u[2]*vw],ve=[v[0]*vh,v[1]*vh,v[2]*vh];return{origin:eye,lowerLeft:[eye[0]-ho[0]/2-ve[0]/2-w[0],eye[1]-ho[1]/2-ve[1]/2-w[1],eye[2]-ho[2]/2-ve[2]/2-w[2]],horizontal:ho,vertical:ve};}
function hitTri(ro,rd,v0,v1,v2){const e1=sub(v1,v0),e2=sub(v2,v0),p=cross(rd,e2),det=dot(e1,p);if(det>-1e-7&&det<1e-7)return -1;const inv=1/det,t=sub(ro,v0),u=dot(t,p)*inv;if(u<0||u>1)return -1;const q=cross(t,e1),vv=dot(rd,q)*inv;if(vv<0||u+vv>1)return -1;const tt=dot(e2,q)*inv;return tt>1e-4?tt:-1;}
// minimal USDA mesh extractor
function trisFromUsda(text){const m=text.match(/points\s*=\s*\[([^\]]*)\]/);if(!m)return[];const nums=[...m[1].matchAll(/\(([^)]+)\)/g)].map(x=>x[1].split(",").map(Number));const idxm=text.match(/faceVertexIndices\s*=\s*\[([^\]]*)\]/);const idx=idxm?idxm[1].split(",").map(Number):[0,1,2];const tris=[];for(let i=0;i+2<idx.length;i+=3)tris.push([nums[idx[i]],nums[idx[i+1]],nums[idx[i+2]]]);return tris;}
function render(tris,cam,W,H){const fb=new Uint8ClampedArray(W*H*4);const L=norm([-.4,-1,-.3]);for(let py=0;py<H;py++)for(let px=0;px<W;px++){const s=(px+0.5)/W,tp=(py+0.5)/H;const dir=norm([cam.lowerLeft[0]+s*cam.horizontal[0]+tp*cam.vertical[0]-cam.origin[0],cam.lowerLeft[1]+s*cam.horizontal[1]+tp*cam.vertical[1]-cam.origin[1],cam.lowerLeft[2]+s*cam.horizontal[2]+tp*cam.vertical[2]-cam.origin[2]]);let bT=1e30,hi=-1;for(let i=0;i<tris.length;i++){const t=hitTri(cam.origin,dir,tris[i][0],tris[i][1],tris[i][2]);if(t>0&&t<bT){bT=t;hi=i;}}const o=((H-1-py)*W+px)*4;if(hi>=0){let nm=norm(cross(sub(tris[hi][1],tris[hi][0]),sub(tris[hi][2],tris[hi][0])));if(dot(nm,dir)>0)nm=[-nm[0],-nm[1],-nm[2]];const lit=0.25+0.75*Math.max(0,dot(nm,[-L[0],-L[1],-L[2]]));fb[o]=200*lit;fb[o+1]=120*lit;fb[o+2]=210*lit;fb[o+3]=255;}else{fb[o]=13;fb[o+1]=17;fb[o+2]=23;fb[o+3]=255;}}return fb;}

// ── render farm ────────────────────────────────────────────────────────────
class RenderFarm{constructor(){this.jobs=new Map();this.seq=0;}submit(spec){const id="job-"+this.seq++;this.jobs.set(id,{id,spec,status:"queued",frames:[]});return id;}
  run(id){const j=this.jobs.get(id);j.status="running";j.frames=[];for(const cam of j.spec.cameras)j.frames.push(render(j.spec.tris,cam,j.spec.W,j.spec.H));j.status="done";return j;}
  result(id){const j=this.jobs.get(id);return j&&j.status==="done"?j.frames:null;}}

const store=new NucleusStore();const farm=new RenderFarm();const URL="omniverse://kami/scenes/box.usda";
const logEl=document.getElementById("log");let logLines=[];
function log(s){logLines.push(s);if(logLines.length>14)logLines.shift();logEl.textContent=logLines.join("\n");}
store.subscribe("omniverse://kami/scenes/",e=>log("↺ change "+e.kind+" "+e.cid));

let rev=0;
const USDA=v=>`#usda 1.0\ndef Mesh "box" {\n  point3f[] points = [(-1,-1,0),(1,-1,0),(0,${1+v*0.2},0)]\n  int[] faceVertexIndices = [0,1,2]\n}`;
document.getElementById("write").onclick=()=>{const text=USDA(rev);store.write(URL,text);store.write(URL,text,"checkpoint rev"+rev);rev++;
  const hist=store.history(URL);log("write+checkpoint → "+hist.length+" versions; head "+hist[hist.length-1].cid);};

document.getElementById("render").onclick=()=>{const text=store.read(URL);if(!text){log("nothing in Nucleus — write first");return;}
  const tris=trisFromUsda(text);const N=24,W=120,H=120;const cams=[];for(let i=0;i<N;i++){const a=i/N*Math.PI*2;cams.push(lookAt([Math.cos(a)*4,1.2,Math.sin(a)*4],[0,0.2,0],[0,1,0],45,1));}
  const id=farm.submit({tris,cameras:cams,W,H});log("submit "+id+" ("+N+" cameras) → Murakumo fleet");farm.run(id);const frames=farm.result(id);log("done "+id+": "+frames.length+" frames");
  document.getElementById("n").textContent=frames.length;const ctx=document.getElementById("cv").getContext("2d");let i=0;
  (function play(){if(i>=frames.length)i=0;ctx.putImageData(new ImageData(frames[i],W,H),0,0);document.getElementById("f").textContent=i+1;i++;setTimeout(play,80);})();};
</script>
</body>
</html>
