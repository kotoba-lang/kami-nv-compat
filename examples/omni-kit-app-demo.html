<!DOCTYPE html>
<!--
  omni.kit.app → amenominaka Kit-app demo.

  Standalone HTML, zero build step. Hosts a clean-room Kit Application: register
  extensions (each with an extension.toml declaring dependencies), start them in
  dependency order, run an update loop where a KamiViewer extension loads a USD
  stage and ray-traces it via kami-rt, and exercise the undo/redo command stack.

  Mirrors the canonical TypeScript sources at:
    20-actors/etzhayyim-sdk/src/nv-compat/amenominaka/*.ts
    20-actors/etzhayyim-sdk/src/nv-compat/omni-kit-app.ts

  Clean-room: Omniverse / Kit are trademarks of NVIDIA Corporation; names used
  here are API-compat identifiers only (Google v. Oracle, 2021). No Kit
  source/binaries are used.

  ADR-2605261800 §D1/D6/D10.4 — R1.4 omni-kit-app surface.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>omni.kit.app → amenominaka (nv-compat R1.4)</title>
  <style>
    html,body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
    h1{margin:0;font-size:17px;color:#7ee787;}
    .row{display:flex;gap:18px;align-items:flex-start;}
    canvas{border:1px solid #21262d;border-radius:6px;background:#0d1117;image-rendering:pixelated;width:200px;height:200px;}
    pre{font-size:11px;color:#8b949e;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px;width:340px;min-height:200px;}
    .ctl{display:flex;gap:8px;}
    button{background:#238636;color:#fff;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;}
  </style>
</head>
<body>
  <h1>omni.kit.app → amenominaka Kit application</h1>
  <div class="ctl">
    <button id="startup">startupAll()</button>
    <button id="set">execute SetAttribute</button>
    <button id="undo">undo</button>
    <button id="redo">redo</button>
    <button id="shutdown">shutdownAll()</button>
  </div>
  <div class="row">
    <canvas id="cv" width="100" height="100"></canvas>
    <pre id="log">app log…</pre>
  </div>

<script type="module">
// ── amenominaka (compact mirror) ───────────────────────────────────────────
class IExt{onStartup(){}onUpdate(){}onShutdown(){}}
function parseToml(text){const root={};let cur=root;const strip=l=>{let s=false,o="";for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'&&l[i-1]!=="\\")s=!s;if(c==="#"&&!s)break;o+=c;}return o;};
  const val=r=>{r=r.trim();if(r.startsWith('"')&&r.endsWith('"'))return r.slice(1,-1);if(r.startsWith("[")&&r.endsWith("]")){const inn=r.slice(1,-1).trim();return inn?inn.split(",").map(x=>val(x)):[];}if(r.startsWith("{")&&r.endsWith("}")){const o={};const inn=r.slice(1,-1).trim();if(inn)for(const p of inn.split(",")){const e=p.indexOf("=");if(e>=0)o[p.slice(0,e).trim().replace(/^"|"$/g,"")]=val(p.slice(e+1));}return o;}if(r==="true"||r==="false")return r==="true";const n=Number(r);return r&&!isNaN(n)?n:r;};
  const ensure=(p)=>{let n=root;for(const k of p){if(typeof n[k]!=="object"||Array.isArray(n[k]))n[k]={};n=n[k];}return n;};
  for(const raw of text.split("\n")){const line=strip(raw).trim();if(!line)continue;
    if(line.startsWith("[[")){const name=line.slice(2,line.indexOf("]]")).trim().split(".");const par=ensure(name.slice(0,-1));const key=name[name.length-1];if(!Array.isArray(par[key]))par[key]=[];const e={};par[key].push(e);cur=e;}
    else if(line.startsWith("[")){cur=ensure(line.slice(1,line.indexOf("]")).trim().split("."));}
    else{const e=line.indexOf("=");if(e<0)continue;cur[line.slice(0,e).trim().replace(/^"|"$/g,"")]=val(line.slice(e+1));}}
  const pkg=root.package||{};return{title:pkg.title||"",version:pkg.version||"0.1.0",dependencies:root.dependencies||{},rawTables:root};
}
class Application{constructor(){this.ext=new Map();}register(id,inst,toml){this.ext.set(id,{id,inst,toml,started:false});}
  topo(){const dm=new Map();for(const[id,e]of this.ext){const d=[];if(e.toml)for(const k of Object.keys(e.toml.dependencies))if(this.ext.has(k))d.push(k);dm.set(id,d);}const ind=new Map();for(const[i,d]of dm)ind.set(i,d.length);const ready=[...ind].filter(([,d])=>d===0).map(([e])=>e).sort();const order=[];while(ready.length){const id=ready.shift();order.push(id);for(const[o,d]of dm)if(d.includes(id)){ind.set(o,ind.get(o)-1);if(ind.get(o)===0)ready.push(o);}ready.sort();}if(order.length!==this.ext.size)throw new Error("Cyclic dependency");return order;}
  startupAll(){const o=this.topo();for(const id of o){const e=this.ext.get(id);if(!e.started){e.inst.onStartup(id);e.started=true;}}return o;}
  update(dt){for(const e of this.ext.values())if(e.started)e.inst.onUpdate(dt);}
  shutdownAll(){let o;try{o=this.topo();}catch{o=[...this.ext.keys()];}const done=[];for(let i=o.length-1;i>=0;i--){const e=this.ext.get(o[i]);if(e.started){e.inst.onShutdown();e.started=false;done.push(o[i]);}}return done;}}
class SetAttr{constructor(t,k,v){this.t=t;this.k=k;this.v=v;this.name="SetAttribute";}do(){this.had=this.k in this.t;this.prev=this.t[this.k];this.t[this.k]=this.v;}undo(){if(this.had)this.t[this.k]=this.prev;else delete this.t[this.k];}}
class CommandStack{constructor(){this.u=[];this.r=[];}execute(c){c.do();this.u.push(c);this.r=[];}undo(){const c=this.u.pop();if(!c)return;c.undo();this.r.push(c);}redo(){const c=this.r.pop();if(!c)return;c.do();this.u.push(c);}}

// ── kami-rt (compact ray tracer) ───────────────────────────────────────────
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],norm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1;return[a[0]/l,a[1]/l,a[2]/l];};
function lookAt(eye,t,up,vf,asp){const th=vf*Math.PI/180,h=Math.tan(th/2),vh=2*h,vw=asp*vh,w=norm(sub(eye,t)),u=norm(cross(up,w)),v=cross(w,u),ho=[u[0]*vw,u[1]*vw,u[2]*vw],ve=[v[0]*vh,v[1]*vh,v[2]*vh];return{origin:eye,lowerLeft:[eye[0]-ho[0]/2-ve[0]/2-w[0],eye[1]-ho[1]/2-ve[1]/2-w[1],eye[2]-ho[2]/2-ve[2]/2-w[2]],horizontal:ho,vertical:ve};}
function hitTri(ro,rd,v0,v1,v2){const e1=sub(v1,v0),e2=sub(v2,v0),p=cross(rd,e2),det=dot(e1,p);if(det>-1e-7&&det<1e-7)return -1;const inv=1/det,t=sub(ro,v0),u=dot(t,p)*inv;if(u<0||u>1)return -1;const q=cross(t,e1),vv=dot(rd,q)*inv;if(vv<0||u+vv>1)return -1;const tt=dot(e2,q)*inv;return tt>1e-4?tt:-1;}
function render(tris,col,cam,W,H){const fb=new Uint8ClampedArray(W*H*4);const L=norm([-.4,-1,-.3]);for(let py=0;py<H;py++)for(let px=0;px<W;px++){const s=(px+0.5)/W,tp=(py+0.5)/H;const dir=norm([cam.lowerLeft[0]+s*cam.horizontal[0]+tp*cam.vertical[0]-cam.origin[0],cam.lowerLeft[1]+s*cam.horizontal[1]+tp*cam.vertical[1]-cam.origin[1],cam.lowerLeft[2]+s*cam.horizontal[2]+tp*cam.vertical[2]-cam.origin[2]]);let bT=1e30,hi=-1;for(let i=0;i<tris.length;i++){const t=hitTri(cam.origin,dir,tris[i][0],tris[i][1],tris[i][2]);if(t>0&&t<bT){bT=t;hi=i;}}const o=((H-1-py)*W+px)*4;if(hi>=0){let nm=norm(cross(sub(tris[hi][1],tris[hi][0]),sub(tris[hi][2],tris[hi][0])));if(dot(nm,dir)>0)nm=[-nm[0],-nm[1],-nm[2]];const lit=0.25+0.75*Math.max(0,dot(nm,[-L[0],-L[1],-L[2]]));fb[o]=col[0]*lit*255;fb[o+1]=col[1]*lit*255;fb[o+2]=col[2]*lit*255;fb[o+3]=255;}else{fb[o]=13;fb[o+1]=17;fb[o+2]=23;fb[o+3]=255;}}return fb;}

// ── KamiViewer extension ────────────────────────────────────────────────────
class KamiViewer extends IExt{constructor(){super();this.tris=[[[-1,-1,0],[1,-1,0],[0,1.2,0]]];this.col=[0.85,0.3,0.3];this.cam=lookAt([1.2,0.6,4],[0,0,0],[0,1,0],45,1);this.frame=0;}
  onStartup(id){log("on_startup: "+id+" (USD stage loaded, 1 mesh)");}
  onUpdate(dt){const W=100,H=100;const a=this.frame*0.04;this.cam=lookAt([Math.sin(a)*4,0.8,Math.cos(a)*4],[0,0,0],[0,1,0],45,1);const fb=render(this.tris,this.col,this.cam,W,H);const ctx=document.getElementById("cv").getContext("2d");ctx.putImageData(new ImageData(fb,W,H),0,0);this.frame++;}
  onShutdown(){log("on_shutdown: kami.viewer (scene released)");}}

const logEl=document.getElementById("log");let logLines=[];
function log(s){logLines.push(s);if(logLines.length>14)logLines.shift();logEl.textContent=logLines.join("\n");}

const appObj=new Application();const stack=new CommandStack();const attrTarget={"viewport:fov":45};let viewer=new KamiViewer();let raf=null;
const baseToml=parseToml(`[package]\ntitle="Base"`);
const usdToml=parseToml(`[package]\ntitle="USD"\n[dependencies]\n"kami.base"={}`);
const viewerToml=parseToml(`[package]\ntitle="Viewer"\n[dependencies]\n"kami.base"={}\n"kami.usd"={}`);
appObj.register("kami.base",new IExt(),baseToml);
appObj.register("kami.usd",new IExt(),usdToml);
appObj.register("kami.viewer",viewer,viewerToml);
log("registered: kami.base, kami.usd, kami.viewer");

document.getElementById("startup").onclick=()=>{const order=appObj.startupAll();log("startupAll order → "+order.join(" → "));if(raf)cancelAnimationFrame(raf);const tick=()=>{appObj.update(0.016);raf=requestAnimationFrame(tick);};tick();};
document.getElementById("set").onclick=()=>{const nv=attrTarget["viewport:fov"]===45?60:45;stack.execute(new SetAttr(attrTarget,"viewport:fov",nv));log("execute SetAttribute viewport:fov="+attrTarget["viewport:fov"]);};
document.getElementById("undo").onclick=()=>{stack.undo();log("undo → viewport:fov="+attrTarget["viewport:fov"]);};
document.getElementById("redo").onclick=()=>{stack.redo();log("redo → viewport:fov="+attrTarget["viewport:fov"]);};
document.getElementById("shutdown").onclick=()=>{if(raf)cancelAnimationFrame(raf);log("shutdownAll → "+appObj.shutdownAll().join(" → "));};
</script>
</body>
</html>
