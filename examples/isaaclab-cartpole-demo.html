<!DOCTYPE html>
<!--
  isaaclab.envs → e7m-shugyo ManagerBasedRLEnv demo (Cartpole).

  Standalone HTML, zero build step. Runs the clean-room manager-based RL
  environment (Cartpole) closed-loop under a PD controller, drawing the cart +
  pole and the live reward breakdown / observation vector.

  Mirrors the canonical TypeScript sources at:
    20-actors/etzhayyim-sdk/src/nv-compat/e7m-shugyo/*.ts
    20-actors/etzhayyim-sdk/src/nv-compat/isaaclab-envs.ts

  Clean-room: Isaac / Isaac Lab are trademarks of NVIDIA Corporation; names
  used here are API-compat identifiers only (Google v. Oracle, 2021). No Isaac
  Lab source/weights/binaries are used.

  ADR-2605261800 §D1/D6/D10.4 — R1.5 isaaclab/envs surface.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>isaaclab ManagerBasedRLEnv → e7m-shugyo Cartpole (nv-compat R1.5)</title>
  <style>
    html,body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
    h1{margin:0;font-size:17px;color:#7ee787;}
    .ctl{display:flex;gap:10px;align-items:center;font-size:13px;}
    select,button{background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:6px 10px;}
    button{background:#238636;border:0;cursor:pointer;}
    canvas{border:1px solid #21262d;border-radius:6px;background:#0d1117;}
    .stats{font-size:12px;font-family:ui-monospace,monospace;color:#8b949e;}
    pre{font-size:11px;color:#8b949e;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px;width:540px;}
  </style>
</head>
<body>
  <h1>isaaclab ManagerBasedRLEnv → e7m-shugyo Cartpole</h1>
  <div class="ctl">
    <label>controller
      <select id="ctrl"><option value="pd">PD balance</option><option value="none">none (falls)</option><option value="rand">random</option></select>
    </label>
    <button id="run">Run</button>
    <span class="stats">step <span id="step">0</span> · reward <span id="r">0</span> · episodes <span id="ep">0</span></span>
  </div>
  <canvas id="cv" width="540" height="260"></canvas>
  <pre id="brk">obs / reward breakdown appears here.</pre>

<script type="module">
// ── e7m-shugyo (compact mirror: managers + cartpole + env) ─────────────────
const MASK=(1n<<64n)-1n,MUL=6364136223846793005n,INC=1442695040888963407n;
class Sampler{constructor(s=0){this.s=(BigInt(s)*MUL+INC)&MASK;}u01(){this.s=(this.s*MUL+INC)&MASK;return Number((this.s>>33n)&0x7fffffffn)/2147483648;}}
const centered=(rng,h)=>(rng.u01()*2-1)*h;
const CFG={physicsDt:1/60,decimation:2,gravity:9.81,cartMass:1,poleMass:0.1,poleLength:0.5,forceMag:10,alive:1,terminating:-2,polePos:-1,cartVel:-0.01,poleVel:-0.005,maxSteps:Math.round(8/(1/60)),poleBound:0.6,cartBound:2.4,resetNoise:0.05};
function cartpoleStep(s,f,c){const total=c.cartMass+c.poleMass,ct=Math.cos(s.theta),st=Math.sin(s.theta);const temp=(f+c.poleMass*c.poleLength*s.thetaDot*s.thetaDot*st)/total;const ta=(c.gravity*st-ct*temp)/(c.poleLength*(4/3-c.poleMass*ct*ct/total));const xa=temp-c.poleMass*c.poleLength*ta*ct/total;const dt=c.physicsDt;return{x:s.x+dt*s.xDot,xDot:s.xDot+dt*xa,theta:s.theta+dt*s.thetaDot,thetaDot:s.thetaDot+dt*ta};}
function makeEnv(){const rng=new Sampler(7);let state,steps,lastAction;
  function reset(){state={x:centered(rng,0.05),xDot:centered(rng,0.05),theta:centered(rng,0.05),thetaDot:centered(rng,0.05)};steps=0;lastAction=0;return obs();}
  function obs(){return[state.x,state.theta,state.xDot,state.thetaDot,0.1*lastAction];}
  function reward(term){return CFG.alive*(term?0:1)+CFG.terminating*(term?1:0)+CFG.polePos*state.theta*state.theta+CFG.cartVel*state.xDot*state.xDot+CFG.poleVel*state.thetaDot*state.thetaDot;}
  function step(a){const f=Math.max(-CFG.forceMag,Math.min(CFG.forceMag,a*CFG.forceMag));lastAction=a;for(let d=0;d<CFG.decimation;d++)state=cartpoleStep(state,f,CFG);steps++;
    const poleOob=Math.abs(state.theta)>CFG.poleBound,cartOob=Math.abs(state.x)>CFG.cartBound,timeout=steps>=CFG.maxSteps;const terminated=poleOob||cartOob;const r=reward(terminated);
    const brk={alive:CFG.alive*(terminated?0:1),terminating:CFG.terminating*(terminated?1:0),polePos:+(CFG.polePos*state.theta*state.theta).toFixed(4),cartVel:+(CFG.cartVel*state.xDot*state.xDot).toFixed(4),poleVel:+(CFG.poleVel*state.thetaDot*state.thetaDot).toFixed(4)};
    let o=obs();const done=terminated||timeout;if(done){state={x:centered(rng,0.05),xDot:centered(rng,0.05),theta:centered(rng,0.05),thetaDot:centered(rng,0.05)};steps=0;lastAction=0;o=obs();}
    return{observations:o,reward:r,terminated,truncated:timeout,breakdown:brk};}
  return{reset,step,get state(){return state;}};
}

const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
function draw(s){ctx.fillStyle="#0d1117";ctx.fillRect(0,0,cv.width,cv.height);
  const cx=cv.width/2,trackY=190,SCALE=80;
  ctx.strokeStyle="#21262d";ctx.beginPath();ctx.moveTo(0,trackY);ctx.lineTo(cv.width,trackY);ctx.stroke();
  const px=cx+s.x*SCALE;
  // cart
  ctx.fillStyle="#7ee787";ctx.fillRect(px-26,trackY-14,52,28);
  // pole (theta from upright)
  const L=110,tipx=px+L*Math.sin(s.theta),tipy=trackY-14-L*Math.cos(s.theta);
  ctx.strokeStyle="#58a6ff";ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(px,trackY-14);ctx.lineTo(tipx,tipy);ctx.stroke();
  ctx.fillStyle="#f0883e";ctx.beginPath();ctx.arc(tipx,tipy,7,0,7);ctx.fill();ctx.lineWidth=1;
}

let timer=null;
function run(){if(timer)clearInterval(timer);const env=makeEnv();let obs=env.reset();const mode=document.getElementById("ctrl").value;
  let step=0,episodes=0,epReward=0,rng=Math.random;
  const control=o=>mode==="pd"?Math.max(-1,Math.min(1,8*o[1]+1.5*o[3]+0.2*o[0])):mode==="rand"?(rng()*2-1):0;
  timer=setInterval(()=>{
    const a=control(obs);const out=env.step(a);epReward+=out.reward;
    draw(env.state);step++;
    document.getElementById("step").textContent=step;
    document.getElementById("r").textContent=epReward.toFixed(1);
    document.getElementById("ep").textContent=episodes;
    document.getElementById("brk").textContent="obs [x, θ, ẋ, θ̇, 0.1·a] = ["+out.observations.map(v=>v.toFixed(3)).join(", ")+"]\nreward breakdown = "+JSON.stringify(out.breakdown);
    if(out.terminated||out.truncated){episodes++;epReward=0;}
    obs=out.observations;if(step>1200)clearInterval(timer);
  },25);
}
document.getElementById("run").addEventListener("click",run);
run();
</script>
</body>
</html>
