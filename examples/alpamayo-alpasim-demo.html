<!DOCTYPE html>
<!--
  Alpamayo® VLA → AlpaSim closed-loop demo (top-down BEV).

  Standalone HTML, zero build step. Open directly in any browser. Drives a
  clean-room reasoning planner (michibiki) closed-loop through scripted
  scenarios via the AlpaSim-compatible harness, rendering the ego + agents +
  the predicted 6.4 s trajectory in bird's-eye view, with the live
  Chain-of-Causation reasoning printed below.

  Mirrors the canonical TypeScript sources at:
    20-actors/etzhayyim-sdk/src/nv-compat/kami-drive/{unicycle,planner,coc}.ts
    20-actors/etzhayyim-sdk/src/nv-compat/{alpamayo,alpasim}.ts

  Clean-room: Alpamayo / AlpaSim / DRIVE are trademarks of NVIDIA Corporation;
  names used here are API-compat identifiers only (Google v. Oracle, 2021). No
  Alpamayo/Cosmos weights, source, or binaries are used. Civilian, SAE-L4
  ceiling, simulation-only (no actuation).

  AV scope per ADR-2605242000 (wadachi) / ADR-2606010600 (kami-autodrive).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alpamayo® → AlpaSim closed-loop (nv-compat)</title>
  <style>
    html,body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
    h1{margin:0;font-size:17px;color:#7ee787;}
    .ctl{display:flex;gap:10px;align-items:center;font-size:13px;}
    select,button{background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:6px 10px;font-size:13px;}
    button{background:#238636;border:0;cursor:pointer;}
    canvas{border:1px solid #21262d;border-radius:6px;background:#0d1117;}
    .stats{font-size:12px;font-family:ui-monospace,monospace;color:#8b949e;}
    #coc{max-width:560px;font-size:12px;color:#c9d1d9;line-height:1.5;min-height:34px;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px 12px;}
    .cluster{color:#d2a8ff;}
  </style>
</head>
<body>
  <h1>Alpamayo® VLA → AlpaSim closed-loop (BEV)</h1>
  <div class="ctl">
    <label>scenario
      <select id="scn">
        <option value="clear">Clear road (cruise)</option>
        <option value="lead">Stopped lead vehicle</option>
        <option value="ped">Pedestrian crossing</option>
        <option value="turn">Left turn</option>
      </select>
    </label>
    <button id="run">Run rollout</button>
    <span class="stats">reward: <span id="reward">—</span> · clearance: <span id="clr">—</span> · collision: <span id="col">—</span></span>
  </div>
  <canvas id="cv" width="560" height="360"></canvas>
  <div id="coc">Chain-of-Causation reasoning appears here.</div>

<script type="module">
// ── kami-drive (compact mirror) ────────────────────────────────────────────
const DEF={horizonS:6.4,hz:10,comfortAccel:1.5,turnCurvature:0.05,lookAhead:60,laneHalfWidth:1.5,safeGap:5,maxSpeed:30};
function stepUni(s,a,dt,vmax=30){return{x:s.x+s.speed*Math.cos(s.yaw)*dt,y:s.y+s.speed*Math.sin(s.yaw)*dt,yaw:s.yaw+s.speed*a.curvature*dt,speed:Math.min(vmax,Math.max(0,s.speed+a.accel*dt))};}
function rollout(init,acts,dt,vmax=30){const out=[];let s=init;const emit=(t,a)=>out.push({t,x:s.x,y:s.y,yaw:s.yaw,speed:s.speed,accel:a.accel,curvature:a.curvature});emit(0,{accel:0,curvature:0});for(let i=0;i<acts.length;i++){s=stepUni(s,acts[i],dt,vmax);emit((i+1)*dt,acts[i]);}return out;}
function yieldCheck(obs,cfg){let dec={targetSpeed:cfg.maxSpeed,agent:null};for(const a of obs.agents){if(a.x<=0||a.x>cfg.lookAhead)continue;const yNow=a.y,ySoon=a.y+a.vy*1;const inC=Math.min(Math.abs(yNow),Math.abs(ySoon))<=cfg.laneHalfWidth||yNow*ySoon<0;if(!inC)continue;const gap=a.x-cfg.safeGap;const vru=a.kind==="pedestrian"||a.kind==="cyclist";const allowed=vru?0:Math.max(0,Math.min(cfg.maxSpeed,a.vx+Math.sqrt(2*cfg.comfortAccel*Math.max(0,gap))));if(allowed<dec.targetSpeed)dec={targetSpeed:allowed,agent:a,gap};}return dec;}
function plan(obs,config={}){const cfg={...DEF,...config};const steps=Math.round(cfg.horizonS*cfg.hz),dt=1/cfg.hz;let cmd=obs.command;const builder=[];let cluster="nominal";let curv=0;
  if(cmd==="turn_left"){curv=cfg.turnCurvature;cluster="intersection";builder.push(["Navigation command is turn-left","the ego is approaching a left turn","steer left"]);}
  else if(cmd==="turn_right"){curv=-cfg.turnCurvature;cluster="intersection";builder.push(["Navigation command is turn-right","the ego is approaching a right turn","steer right"]);}
  const limit=obs.speedLimit??cfg.maxSpeed;let target=cmd==="stop"?0:Math.min(cfg.maxSpeed,limit);if(cmd==="stop"){cluster="stop";builder.push(["Navigation command is stop","the ego must halt","decelerate to zero"]);}
  const y=yieldCheck(obs,cfg);if(y.agent&&y.targetSpeed<target){target=y.targetSpeed;const a=y.agent,vru=a.kind==="pedestrian"||a.kind==="cyclist";cluster=vru?"vru_interaction":"yield";builder.push([`${a.kind} ${a.x.toFixed(1)} m ahead in the ego corridor`,vru?"must yield to a vulnerable road user":"must keep a safe gap",y.targetSpeed===0?"decelerate to a stop":`reduce speed to ${y.targetSpeed.toFixed(1)} m/s`]);}
  else if(cmd==="keep_lane"&&!builder.length){builder.push(["Lane is clear ahead","nominal cruising holds",`maintain ${target.toFixed(1)} m/s`]);}
  const acts=[];let speed=obs.ego.speed;for(let i=0;i<steps;i++){const err=target-speed;const accel=Math.max(-cfg.comfortAccel,Math.min(cfg.comfortAccel,err/dt));const ramp=Math.min(1,i*dt);const curvature=speed>0.1?curv*ramp:0;acts.push({accel,curvature});speed=Math.min(cfg.maxSpeed,Math.max(0,speed+accel*dt));}
  const traj=rollout({x:0,y:0,yaw:0,speed:obs.ego.speed},acts,dt,cfg.maxSpeed);
  const narrative=builder.length?builder.map(([o,i,a])=>`Because ${o[0].toLowerCase()+o.slice(1)}, ${i}; therefore ${a}.`).join(" "):"Proceeding under nominal conditions.";
  return{trajectory:traj,reasoning:{eventCluster:cluster,narrative}};
}
const model={predict:obs=>plan(obs)};

// ── alpasim (compact mirror) ───────────────────────────────────────────────
function toEgo(ego,a){const c=Math.cos(-ego.yaw),s=Math.sin(-ego.yaw),dx=a.x-ego.x,dy=a.y-ego.y;const rvx=a.vx-ego.speed*Math.cos(ego.yaw),rvy=a.vy-ego.speed*Math.sin(ego.yaw);return{id:a.id,kind:a.kind,x:dx*c-dy*s,y:dx*s+dy*c,vx:rvx*c-rvy*s,vy:rvx*s+rvy*c};}
function runClosedLoop(model,sc){const hz=sc.hz,dt=1/hz,n=Math.round(sc.durationS*hz);let ego={...sc.ego};const agents=sc.agents.map(a=>({...a}));const steps=[];let progress=0,collision=false,minClr=Infinity,prevA=0,jerkSq=0;
  for(let i=0;i<n;i++){const perceived=agents.map(a=>toEgo(ego,a));const obs={ego:{x:0,y:0,yaw:0,speed:ego.speed},command:sc.command,agents:perceived,speedLimit:sc.speedLimit};const out=model.predict(obs);const action=out.trajectory[1]?{accel:out.trajectory[1].accel,curvature:out.trajectory[1].curvature}:{accel:0,curvature:0};
    const b={x:ego.x,y:ego.y};const bev=stepUni({x:ego.x,y:ego.y,yaw:ego.yaw,speed:ego.speed},action,dt);ego={...ego,x:bev.x,y:bev.y,yaw:bev.yaw,speed:bev.speed};progress+=Math.hypot(ego.x-b.x,ego.y-b.y);
    for(const a of agents){a.x+=a.vx*dt;a.y+=a.vy*dt;}let sm=Infinity;for(const a of agents){const d=Math.hypot(a.x-ego.x,a.y-ego.y)-(a.radius+ego.radius);if(d<sm)sm=d;if(d<=0)collision=true;}if(sm<minClr)minClr=sm;const jerk=(action.accel-prevA)/dt;jerkSq+=jerk*jerk;prevA=action.accel;
    steps.push({t:i*dt,ego:{...ego},agents:agents.map(a=>({...a})),reasoning:out.reasoning});}
  const reward=collision?0:Math.max(0,Math.min(1,(progress/Math.max(1e-3,(sc.speedLimit??30)*sc.durationS))*(1-0.3*Math.min(1,Math.sqrt(jerkSq/n)/20))));
  return{steps,collision,minClearance:minClr,reward};}

// ── scenarios ──────────────────────────────────────────────────────────────
const SCEN={
  clear:()=>({ego:{x:0,y:0,yaw:0,speed:8,radius:1.5},agents:[],command:"keep_lane",speedLimit:13,durationS:6,hz:10}),
  lead: ()=>({ego:{x:0,y:0,yaw:0,speed:8,radius:1.5},agents:[{id:"lead",kind:"vehicle",x:45,y:0,vx:0,vy:0,radius:1.5}],command:"keep_lane",speedLimit:13,durationS:8,hz:10}),
  ped:  ()=>({ego:{x:0,y:0,yaw:0,speed:7,radius:1.5},agents:[{id:"ped",kind:"pedestrian",x:35,y:-6,vx:0,vy:1.2,radius:0.5}],command:"keep_lane",speedLimit:11,durationS:8,hz:10}),
  turn: ()=>({ego:{x:0,y:0,yaw:0,speed:6,radius:1.5},agents:[],command:"turn_left",speedLimit:8,durationS:6,hz:10}),
};

// ── render ─────────────────────────────────────────────────────────────────
const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
const SCALE=5, OX=70, OY=180; // world→screen: +x right, +y up
const wx=x=>OX+x*SCALE, wy=y=>OY-y*SCALE;
function draw(frame){ctx.fillStyle="#0d1117";ctx.fillRect(0,0,cv.width,cv.height);
  // lane
  ctx.strokeStyle="#21262d";ctx.lineWidth=1;ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(0,wy(0));ctx.lineTo(cv.width,wy(0));ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle="#1b2530";ctx.beginPath();ctx.moveTo(0,wy(1.8));ctx.lineTo(cv.width,wy(1.8));ctx.moveTo(0,wy(-1.8));ctx.lineTo(cv.width,wy(-1.8));ctx.stroke();
  if(!frame)return;
  // predicted trajectory (ego frame → world)
  const e=frame.ego;const pred=plan({ego:{x:0,y:0,yaw:0,speed:e.speed},command:frame.command,agents:frame.agents.map(a=>{const c=Math.cos(-e.yaw),s=Math.sin(-e.yaw),dx=a.x-e.x,dy=a.y-e.y;return{...a,x:dx*c-dy*s,y:dx*s+dy*c,vx:0,vy:0};}),speedLimit:frame.limit}).trajectory;
  ctx.strokeStyle="#7ee787";ctx.lineWidth=2;ctx.beginPath();pred.forEach((p,i)=>{const c=Math.cos(e.yaw),s=Math.sin(e.yaw);const X=e.x+p.x*c-p.y*s,Y=e.y+p.x*s+p.y*c;i?ctx.lineTo(wx(X),wy(Y)):ctx.moveTo(wx(X),wy(Y));});ctx.stroke();
  // agents
  for(const a of frame.agents){ctx.fillStyle=a.kind==="pedestrian"?"#f0883e":"#58a6ff";ctx.beginPath();ctx.arc(wx(a.x),wy(a.y),Math.max(4,a.radius*SCALE),0,7);ctx.fill();}
  // ego
  ctx.save();ctx.translate(wx(e.x),wy(e.y));ctx.rotate(-e.yaw);ctx.fillStyle="#7ee787";ctx.fillRect(-9,-5,18,10);ctx.restore();
}

let timer=null;
function run(){if(timer)clearInterval(timer);const key=document.getElementById("scn").value;const sc=SCEN[key]();sc._limit=sc.speedLimit;
  const res=runClosedLoop(model,sc);
  document.getElementById("reward").textContent=res.reward.toFixed(3);
  document.getElementById("clr").textContent=(isFinite(res.minClearance)?res.minClearance.toFixed(1)+" m":"—");
  document.getElementById("col").textContent=res.collision?"YES":"no";
  let i=0;timer=setInterval(()=>{if(i>=res.steps.length){clearInterval(timer);return;}const st=res.steps[i];const frame={ego:st.ego,agents:st.agents,command:sc.command,limit:sc.speedLimit};draw(frame);
    document.getElementById("coc").innerHTML=`<span class="cluster">[${st.reasoning.eventCluster}]</span> ${st.reasoning.narrative}`;i++;},50);
}
document.getElementById("run").addEventListener("click",run);
draw(null);run();
</script>
</body>
</html>
