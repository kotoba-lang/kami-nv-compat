<!DOCTYPE html>
<!--
  DRIVE Sim® → wadachi-sim closed-loop sensor demo.

  Standalone HTML, zero build step. Runs a clean-room sensor-realistic AV
  simulation closed-loop: a reasoning planner (michibiki / Alpamayo-compatible)
  drives the ego while a LiDAR scan (ray-cast against the kami-rt BVH) + radar
  detections + the camera ground-truth boxes are visualized live in top-down
  bird's-eye view.

  Mirrors the canonical TypeScript sources at:
    20-actors/etzhayyim-sdk/src/nv-compat/wadachi-sim/*.ts
    20-actors/etzhayyim-sdk/src/nv-compat/drive-sim.ts

  Clean-room: DRIVE / DRIVE Sim are trademarks of NVIDIA Corporation; names
  used here are API-compat identifiers only (Google v. Oracle, 2021). No DRIVE
  Sim source/binaries are used. Civilian, SAE-L4 ceiling, simulation-only.

  ADR-2605261800 §D1/D6 (DriveSim → wadachi-sim).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DRIVE Sim® → wadachi-sim sensors (nv-compat R1.6)</title>
  <style>
    html,body{margin:0;background:#0a0e14;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;}
    h1{margin:0;font-size:17px;color:#7ee787;}
    .ctl{display:flex;gap:10px;align-items:center;font-size:13px;}
    select,button{background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:6px 10px;}
    button{background:#238636;border:0;cursor:pointer;}
    canvas{border:1px solid #21262d;border-radius:6px;background:#0d1117;}
    .stats{font-size:12px;font-family:ui-monospace,monospace;color:#8b949e;}
  </style>
</head>
<body>
  <h1>DRIVE Sim® → wadachi-sim closed-loop (BEV + LiDAR + radar)</h1>
  <div class="ctl">
    <label>scenario
      <select id="scn">
        <option value="lead">Stopped lead vehicle</option>
        <option value="ped">Crossing pedestrian</option>
        <option value="clear">Clear road</option>
      </select>
    </label>
    <button id="run">Run</button>
    <span class="stats">t <span id="t">0.0</span>s · ego <span id="spd">0</span> m/s · lidar pts <span id="pts">0</span> · radar <span id="rad">0</span></span>
  </div>
  <canvas id="cv" width="560" height="380"></canvas>

<script type="module">
// ── kami-drive planner (compact mirror) ────────────────────────────────────
const DEF={horizonS:6.4,hz:10,comfortAccel:1.5,turnCurvature:0.05,lookAhead:60,laneHalfWidth:1.5,safeGap:5,maxSpeed:30};
function stepUni(s,a,dt,v=30){return{x:s.x+s.speed*Math.cos(s.yaw)*dt,y:s.y+s.speed*Math.sin(s.yaw)*dt,yaw:s.yaw+s.speed*a.curvature*dt,speed:Math.min(v,Math.max(0,s.speed+a.accel*dt))};}
function yieldCheck(obs,cfg){let d={t:cfg.maxSpeed,a:null};for(const a of obs.agents){if(a.x<=0||a.x>cfg.lookAhead)continue;const yN=a.y,yS=a.y+a.vy*1;if(!(Math.min(Math.abs(yN),Math.abs(yS))<=cfg.laneHalfWidth||yN*yS<0))continue;const gap=a.x-cfg.safeGap,vru=a.kind==="pedestrian"||a.kind==="cyclist";const al=vru?0:Math.max(0,Math.min(cfg.maxSpeed,a.vx+Math.sqrt(2*cfg.comfortAccel*Math.max(0,gap))));if(al<d.t)d={t:al,a};}return d;}
function planAccel(obs){const cfg=DEF;const limit=obs.speedLimit??cfg.maxSpeed;let target=Math.min(cfg.maxSpeed,limit);const y=yieldCheck(obs,cfg);if(y.a&&y.t<target)target=y.t;const dt=1/cfg.hz;const err=target-obs.ego.speed;return Math.max(-cfg.comfortAccel,Math.min(cfg.comfortAccel,err/dt));}

// ── kami-rt BVH (for LiDAR ray-cast) ───────────────────────────────────────
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
function boxTris(cx,cy,h,yaw){const[hx,hy,hz]=h,c=Math.cos(yaw),s=Math.sin(yaw);const L=[[-hx,-hy,0],[hx,-hy,0],[hx,hy,0],[-hx,hy,0],[-hx,-hy,2*hz],[hx,-hy,2*hz],[hx,hy,2*hz],[-hx,hy,2*hz]];const v=L.map(([x,y,z])=>[cx+x*c-y*s,cy+x*s+y*c,z]);const q=(a,b,cc,d)=>[[v[a],v[b],v[cc]],[v[a],v[cc],v[d]]];return[...q(0,1,2,3),...q(4,5,6,7),...q(0,1,5,4),...q(1,2,6,5),...q(2,3,7,6),...q(3,0,4,7)];}
function hitTri(ro,rd,v0,v1,v2,tmax){const e1=sub(v1,v0),e2=sub(v2,v0),p=cross(rd,e2),det=dot(e1,p);if(det>-1e-7&&det<1e-7)return -1;const inv=1/det,t=sub(ro,v0),u=dot(t,p)*inv;if(u<0||u>1)return -1;const q=cross(t,e1),vv=dot(rd,q)*inv;if(vv<0||u+vv>1)return -1;const tt=dot(e2,q)*inv;return tt>1e-4&&tt<tmax?tt:-1;}
function sceneTris(world){const tris=[];for(const a of world.actors)tris.push(...boxTris(a.x,a.y,a.extent,a.yaw));for(const o of world.obstacles)tris.push(...boxTris(o.x,o.y,o.extent,o.yaw));return tris;}

function lidar(world,tris){const e=world.ego,origin=[e.x+1.8*Math.cos(e.yaw),e.y+1.8*Math.sin(e.yaw),1.8];const pts=[];const N=120;for(let i=0;i<N;i++){const az=e.yaw+(-Math.PI+ (2*Math.PI*i/N));const dir=[Math.cos(az),Math.sin(az),0];let bT=60,hit=false,hx=0,hy=0;for(const t of tris){const tt=hitTri(origin,dir,t[0],t[1],t[2],bT);if(tt>0){bT=tt;hit=true;hx=origin[0]+dir[0]*tt;hy=origin[1]+dir[1]*tt;}}if(hit)pts.push([hx,hy]);}return{origin,pts};}
function radar(world){const e=world.ego,ox=e.x+1.5*Math.cos(e.yaw),oy=e.y+1.5*Math.sin(e.yaw);const evx=e.speed*Math.cos(e.yaw),evy=e.speed*Math.sin(e.yaw);const out=[];for(const a of world.actors){const dx=a.x-ox,dy=a.y-oy,r=Math.hypot(dx,dy);if(r<1e-3||r>150)continue;let az=Math.atan2(dy,dx)-e.yaw;az=Math.atan2(Math.sin(az),Math.cos(az));if(Math.abs(az)>Math.PI/3)continue;const rr=(a.vx-evx)*(dx/r)+(a.vy-evy)*(dy/r);out.push({x:a.x,y:a.y,r,rr});}return out;}
function toEgo(e,a){const c=Math.cos(-e.yaw),s=Math.sin(-e.yaw),dx=a.x-e.x,dy=a.y-e.y,rvx=a.vx-e.speed*Math.cos(e.yaw),rvy=a.vy-e.speed*Math.sin(e.yaw);return{kind:a.kind,x:dx*c-dy*s,y:dx*s+dy*c,vx:rvx*c-rvy*s,vy:rvx*s+rvy*c};}

const SCEN={
  lead:()=>({ego:{x:0,y:0,yaw:0,speed:9,extent:[2.4,1,0.75]},actors:[{id:"lead",kind:"vehicle",x:45,y:0,yaw:0,vx:0,vy:0,extent:[2.4,1,0.75]}],obstacles:[{id:"sign",kind:"unknown",x:18,y:-6,yaw:0,extent:[0.3,0.3,1.5]}]}),
  ped:()=>({ego:{x:0,y:0,yaw:0,speed:8,extent:[2.4,1,0.75]},actors:[{id:"ped",kind:"pedestrian",x:30,y:-7,yaw:0,vx:0,vy:1.3,extent:[0.3,0.3,0.9]}],obstacles:[{id:"tree",kind:"unknown",x:22,y:7,yaw:0,extent:[0.6,0.6,2]}]}),
  clear:()=>({ego:{x:0,y:0,yaw:0,speed:10,extent:[2.4,1,0.75]},actors:[],obstacles:[{id:"a",kind:"unknown",x:20,y:8,yaw:0,extent:[0.5,0.5,1.5]},{id:"b",kind:"unknown",x:35,y:-8,yaw:0,extent:[0.5,0.5,1.5]}]}),
};

const cv=document.getElementById("cv"),ctx=cv.getContext("2d");
const SCALE=5,OX=60,OY=190;
const wx=x=>OX+x*SCALE, wy=y=>OY-y*SCALE;
function draw(world,scan,rad){ctx.fillStyle="#0d1117";ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle="#1b2530";ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(0,wy(0));ctx.lineTo(cv.width,wy(0));ctx.stroke();ctx.setLineDash([]);
  // lidar points
  ctx.fillStyle="#3fb950";for(const p of scan.pts){ctx.fillRect(wx(p[0]),wy(p[1]),1.6,1.6);}
  // lidar origin
  // obstacles
  for(const o of world.obstacles){ctx.fillStyle="#6e7681";ctx.save();ctx.translate(wx(o.x),wy(o.y));ctx.rotate(-o.yaw);ctx.fillRect(-o.extent[0]*SCALE,-o.extent[1]*SCALE,o.extent[0]*2*SCALE,o.extent[1]*2*SCALE);ctx.restore();}
  // actors
  for(const a of world.actors){ctx.fillStyle=a.kind==="pedestrian"?"#f0883e":"#58a6ff";ctx.save();ctx.translate(wx(a.x),wy(a.y));ctx.rotate(-a.yaw);ctx.fillRect(-a.extent[0]*SCALE,-a.extent[1]*SCALE,a.extent[0]*2*SCALE,a.extent[1]*2*SCALE);ctx.restore();}
  // radar rays
  ctx.strokeStyle="#d2a8ff";ctx.lineWidth=1;for(const d of rad){ctx.beginPath();ctx.moveTo(wx(world.ego.x),wy(world.ego.y));ctx.lineTo(wx(d.x),wy(d.y));ctx.stroke();}
  // ego
  const e=world.ego;ctx.save();ctx.translate(wx(e.x),wy(e.y));ctx.rotate(-e.yaw);ctx.fillStyle="#7ee787";ctx.fillRect(-e.extent[0]*SCALE,-e.extent[1]*SCALE,e.extent[0]*2*SCALE,e.extent[1]*2*SCALE);ctx.restore();
}

let timer=null;
function run(){if(timer)clearInterval(timer);const world=SCEN[document.getElementById("scn").value]();const dt=0.1;let tick=0;
  timer=setInterval(()=>{
    const tris=sceneTris(world);const scan=lidar(world,tris);const rad=radar(world);
    draw(world,scan,rad);
    document.getElementById("t").textContent=(tick*dt).toFixed(1);
    document.getElementById("spd").textContent=world.ego.speed.toFixed(1);
    document.getElementById("pts").textContent=scan.pts.length;
    document.getElementById("rad").textContent=rad.length;
    // closed-loop: plan accel from ego-frame observation
    const obs={ego:{x:0,y:0,yaw:0,speed:world.ego.speed},agents:world.actors.map(a=>toEgo(world.ego,a)),speedLimit:13};
    const accel=planAccel(obs);
    const bev=stepUni(world.ego,{accel,curvature:0},dt);world.ego={...world.ego,...bev};
    for(const a of world.actors){a.x+=a.vx*dt;a.y+=a.vy*dt;}
    tick++;if(tick>90)clearInterval(timer);
  },60);
}
document.getElementById("run").addEventListener("click",run);
run();
</script>
</body>
</html>
