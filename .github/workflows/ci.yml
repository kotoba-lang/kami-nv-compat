name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-clj:
    # Clojure port (ADR-2607020130, wave-by-wave). TS+CLJC coexist mid-port;
    # the final wave deletes the TS + this comment.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:lint
      - run: clojure -M:test
